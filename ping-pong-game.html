<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple One Player Ping Pong</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      flex-direction: column;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 24px;
    }

    canvas {
      background: black;
      border: 3px solid white;
    }

    .info {
      margin-top: 10px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <h1>One Player Ping Pong</h1>
  <canvas id="gameCanvas" width="800" height="500"></canvas>
  <div class="info">Move paddle: ↑ ↓ keys | Press Space to restart</div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const paddleWidth = 12;
    const paddleHeight = 100;
    const ballSize = 12;

    let player = {
      x: 20,
      y: canvas.height / 2 - paddleHeight / 2,
      width: paddleWidth,
      height: paddleHeight,
      speed: 7,
      dy: 0,
      score: 0
    };

    let cpu = {
      x: canvas.width - 20 - paddleWidth,
      y: canvas.height / 2 - paddleHeight / 2,
      width: paddleWidth,
      height: paddleHeight,
      speed: 4,
      score: 0
    };

    let ball = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      size: ballSize,
      dx: 5,
      dy: 4
    };

    let gameOver = false;

    function drawRect(x, y, w, h, color = "white") {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w, h);
    }

    function drawBall() {
      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.size, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawNet() {
      for (let i = 0; i < canvas.height; i += 25) {
        drawRect(canvas.width / 2 - 2, i, 4, 15, "gray");
      }
    }

    function drawText(text, x, y, size = "30px") {
      ctx.fillStyle = "white";
      ctx.font = size + " Arial";
      ctx.fillText(text, x, y);
    }

    function resetBall() {
      ball.x = canvas.width / 2;
      ball.y = canvas.height / 2;
      ball.dx = -ball.dx;
      ball.dy = (Math.random() > 0.5 ? 1 : -1) * (3 + Math.random() * 2);
    }

    function update() {
      if (gameOver) return;

      player.y += player.dy;

      if (player.y < 0) player.y = 0;
      if (player.y + player.height > canvas.height) {
        player.y = canvas.height - player.height;
      }

      // CPU follows ball
      let cpuCenter = cpu.y + cpu.height / 2;
      if (cpuCenter < ball.y - 20) cpu.y += cpu.speed;
      else if (cpuCenter > ball.y + 20) cpu.y -= cpu.speed;

      if (cpu.y < 0) cpu.y = 0;
      if (cpu.y + cpu.height > canvas.height) {
        cpu.y = canvas.height - cpu.height;
      }

      ball.x += ball.dx;
      ball.y += ball.dy;

      // Top/bottom bounce
      if (ball.y - ball.size < 0 || ball.y + ball.size > canvas.height) {
        ball.dy *= -1;
      }

      // Player paddle collision
      if (
        ball.x - ball.size < player.x + player.width &&
        ball.y > player.y &&
        ball.y < player.y + player.height &&
        ball.dx < 0
      ) {
        ball.dx *= -1;
        let hitPos = ball.y - (player.y + player.height / 2);
        ball.dy = hitPos * 0.15;
      }

      // CPU paddle collision
      if (
        ball.x + ball.size > cpu.x &&
        ball.y > cpu.y &&
        ball.y < cpu.y + cpu.height &&
        ball.dx > 0
      ) {
        ball.dx *= -1;
        let hitPos = ball.y - (cpu.y + cpu.height / 2);
        ball.dy = hitPos * 0.15;
      }

      // Score
      if (ball.x < 0) {
        cpu.score++;
        if (cpu.score >= 5) gameOver = true;
        resetBall();
      }

      if (ball.x > canvas.width) {
        player.score++;
        if (player.score >= 5) gameOver = true;
        resetBall();
      }
    }

    function draw() {
      drawRect(0, 0, canvas.width, canvas.height, "black");
      drawNet();

      drawRect(player.x, player.y, player.width, player.height);
      drawRect(cpu.x, cpu.y, cpu.width, cpu.height);
      drawBall();

      drawText(player.score, canvas.width / 4, 50);
      drawText(cpu.score, canvas.width * 3 / 4, 50);

      if (gameOver) {
        let msg = player.score > cpu.score ? "You Win!" : "Game Over!";
        drawText(msg, canvas.width / 2 - 90, canvas.height / 2, "40px");
        drawText("Press Space to Restart", canvas.width / 2 - 140, canvas.height / 2 + 50, "24px");
      }
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowUp") player.dy = -player.speed;
      if (e.key === "ArrowDown") player.dy = player.speed;

      if (e.code === "Space" && gameOver) {
        player.score = 0;
        cpu.score = 0;
        gameOver = false;
        resetBall();
      }
    });

    document.addEventListener("keyup", (e) => {
      if (e.key === "ArrowUp" || e.key === "ArrowDown") {
        player.dy = 0;
      }
    });

    gameLoop();
  </script>
</body>
</html>
