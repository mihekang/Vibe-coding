<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Game Menu</title>

  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #74ebd5, #ACB6E5);
      color: white;
    }

    h1 {
      margin-top: 50px;
    }

    .menu {
      margin-top: 60px;
    }

    .game-btn {
      display: block;
      width: 250px;
      margin: 20px auto;
      padding: 15px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background-color: #ffffff;
      color: #333;
      transition: 0.3s;
    }

    .game-btn:hover {
      background-color: #333;
      color: white;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <h1>🎮 Game Center</h1>
  <p>Select a game to play</p>

  <div class="menu">
    <button class="game-btn" onclick="goGame('ping-pong-game.html')">
      🏓 Ping Pong Game
    </button>

    <button class="game-btn" onclick="goGame('maze-game.html')">
      🧩 Maze Game
    </button>

    <button class="game-btn" onclick="goGame('brick-breaker.html')">
      🧱 Brick Breaker Game
    </button>
  </div>

  <script>
    function goGame(game) {
      window.location.href = game;
    }
  </script>

</body>
</html>
